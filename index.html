<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wanxiang Yu — CV</title>
<style>
  :root {
    --ink: #1a1a1a;
    --muted: #5c5c5c;
    --accent: #1f4e79;
    --rule: #d0d0d0;
    --maxw: 820px;
  }
  * { box-sizing: border-box; }
  html { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  body {
    margin: 0;
    font-family: "Georgia", "Times New Roman", "Songti SC", serif;
    color: var(--ink);
    line-height: 1.45;
    font-size: 14px;
    background: #f4f4f4;
  }
  .page {
    max-width: var(--maxw);
    margin: 24px auto;
    background: #fff;
    padding: 44px 52px 52px;
    box-shadow: 0 1px 8px rgba(0,0,0,.12);
  }

  header { text-align: center; border-bottom: 2px solid var(--accent); padding-bottom: 14px; margin-bottom: 18px; }
  header h1 { font-size: 30px; margin: 0 0 4px; letter-spacing: 1px; }
  header .headline { font-size: 13px; color: var(--muted); font-style: italic; margin-bottom: 7px; }
  header .contact { font-size: 12.5px; color: var(--muted); font-family: "Helvetica Neue", Arial, sans-serif; }
  header .contact .sep { margin: 0 7px; color: var(--rule); }

  section { margin-bottom: 18px; }
  h2 {
    font-size: 14px; text-transform: uppercase; letter-spacing: 1.5px;
    color: var(--accent); border-bottom: 1px solid var(--rule);
    padding-bottom: 3px; margin: 0 0 10px;
    font-family: "Helvetica Neue", Arial, sans-serif;
  }

  .summary { margin: 0; text-align: justify; }

  .entry { margin-bottom: 13px; }
  .entry:last-child { margin-bottom: 0; }
  .entry-head { display: flex; justify-content: space-between; align-items: baseline; gap: 12px; }
  .entry-head .left { font-weight: bold; }
  .entry-head .right { color: var(--muted); font-size: 12.5px; white-space: nowrap; font-family: "Helvetica Neue", Arial, sans-serif; }
  .entry .sub { font-style: italic; color: var(--muted); font-size: 13px; margin: 1px 0 4px; }
  .role-block { margin: 7px 0 3px; font-weight: bold; font-size: 13.5px; color: var(--accent); }

  ul { margin: 5px 0 0; padding-left: 18px; }
  li { margin-bottom: 3px; }
  li::marker { color: var(--accent); }

  .pub { padding-left: 22px; text-indent: -22px; margin-bottom: 6px; line-height: 1.6; }
  .pub .me { text-decoration: underline; }
  .tag { display: inline-block; font-family: "Helvetica Neue", Arial, sans-serif;
         font-size: 9.5px; font-weight: 700; letter-spacing: .5px; line-height: 1;
         background: var(--accent); color: #fff; padding: 3px 7px; border-radius: 4px;
         vertical-align: baseline; white-space: nowrap; margin-left: 5px; }

  .skills-row { display: flex; gap: 8px; margin-bottom: 4px; }
  .skills-row .k { flex: 0 0 130px; font-weight: bold; font-family: "Helvetica Neue", Arial, sans-serif; font-size: 12.5px; }
  .skills-row .v { flex: 1; }

  a { color: var(--accent); text-decoration: none; }

  /* floating admin link */
  .admin-fab {
    position: fixed; right: 18px; bottom: 18px;
    background: var(--accent); color: #fff; padding: 9px 15px;
    border-radius: 22px; font-family: "Helvetica Neue", Arial, sans-serif;
    font-size: 13px; box-shadow: 0 2px 8px rgba(0,0,0,.25); z-index: 50;
  }
  .draft-banner {
    max-width: var(--maxw); margin: 12px auto -8px; padding: 8px 14px;
    background: #fff3cd; color: #8a6d00; border-radius: 6px;
    font-family: "Helvetica Neue", Arial, sans-serif; font-size: 12.5px;
  }

  @media print {
    body { background: #fff; font-size: 11.5px; }
    .page { margin: 0; box-shadow: none; max-width: 100%; padding: 0 14mm; }
    .no-print { display: none !important; }
  }
</style>
</head>
<body>

<div id="draftBanner" class="draft-banner no-print" style="display:none;"></div>
<div id="cv" class="page"></div>
<a class="admin-fab no-print" href="admin.html">✎ Edit</a>

<script>
function renderCV() {
  // localStorage draft takes priority (from admin.html edits); otherwise use cv-data.js
  var draft = null;
  try {
    var raw = localStorage.getItem("cvDraft");
    if (raw) draft = JSON.parse(raw);
  } catch (e) {}
  var data = draft || window.CV_DATA;

  if (draft) {
    var b = document.getElementById("draftBanner");
    b.style.display = "block";
    b.innerHTML = "📝 Showing a local unsaved draft (from this browser). " +
      "Open <a href='admin.html'>Edit</a> to export it into cv-data.js, " +
      "or <a href='#' onclick=\"localStorage.removeItem('cvDraft');location.reload();return false;\">discard draft</a>.";
  }

  function esc(s) {
    return String(s == null ? "" : s)
      .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
  }
  function ulist(arr) {
    if (!arr || !arr.length) return "";
    return "<ul>" + arr.map(function (x) { return "<li>" + esc(x) + "</li>"; }).join("") + "</ul>";
  }

  var h = "";
  var bx = data.basics || {};

  // ---- Header ----
  var contact = [];
  if (bx.email)    contact.push("<span>" + esc(bx.email) + "</span>");
  if (bx.phone)    contact.push("<span>" + esc(bx.phone) + "</span>");
  if (bx.github)   contact.push("<span>github.com/" + esc(bx.github) + "</span>");
  if (bx.website)  contact.push("<span>" + esc(bx.website) + "</span>");
  if (bx.location) contact.push("<span>" + esc(bx.location) + "</span>");

  h += "<header>";
  h += "<h1>" + esc(bx.name) + "</h1>";
  if (bx.headline) h += "<div class='headline'>" + esc(bx.headline) + "</div>";
  h += "<div class='contact'>" + contact.join("<span class='sep'>·</span>") + "</div>";
  h += "</header>";

  // ---- Summary ----
  if (data.summary) {
    h += "<section><h2>Summary</h2><p class='summary'>" + esc(data.summary) + "</p></section>";
  }

  // ---- Education ----
  if (data.education && data.education.length) {
    h += "<section><h2>Education</h2>";
    data.education.forEach(function (e) {
      h += "<div class='entry'>";
      h += "<div class='entry-head'><span class='left'>" + esc(e.school) +
           "</span><span class='right'>" + esc(e.date) + "</span></div>";
      h += "<div class='sub'>" + esc(e.degree) + (e.location ? " · " + esc(e.location) : "") + "</div>";
      h += ulist(e.details);
      h += "</div>";
    });
    h += "</section>";
  }

  // ---- Research Interests ----
  if (data.interests && data.interests.length) {
    h += "<section><h2>Research Interests</h2><p style='margin:0;'>" +
         data.interests.map(esc).join(" · ") + "</p></section>";
  }

  // ---- Publications ----
  if (data.publications && data.publications.length) {
    h += "<section><h2>Publications</h2>";
    data.publications.forEach(function (p) {
      var authors = esc(p.authors);
      if (p.me) authors = authors.replace(esc(p.me), "<span class='me'>" + esc(p.me) + "</span>");
      h += "<div class='pub'>" + authors + ". &ldquo;<strong>" + esc(p.title) + "</strong>.&rdquo; <em>" +
           esc(p.venue) + "</em>, " + esc(p.year) + ".";
      if (p.doi) h += " DOI: " + esc(p.doi) + ".";
      if (p.tag) h += "<span class='tag'>" + esc(p.tag) + "</span>";
      h += "</div>";
      h += ulist(p.bullets);
    });
    h += "</section>";
  }

  // ---- Research Experience ----
  if (data.research && data.research.length) {
    h += "<section><h2>Research Experience</h2>";
    data.research.forEach(function (r) {
      h += "<div class='entry'>";
      h += "<div class='entry-head'><span class='left'>" + esc(r.title) +
           "</span><span class='right'>" + esc(r.date) + "</span></div>";
      if (r.org) h += "<div class='sub'>" + esc(r.org) + "</div>";
      h += ulist(r.bullets);
      h += "</div>";
    });
    h += "</section>";
  }

  // ---- Internship / Experience ----
  if (data.experience && data.experience.length) {
    h += "<section><h2>Internship Experience</h2>";
    data.experience.forEach(function (x) {
      h += "<div class='entry'>";
      h += "<div class='entry-head'><span class='left'>" + esc(x.org) + " — " + esc(x.role) +
           "</span><span class='right'>" + (x.location ? esc(x.location) + " · " : "") + esc(x.date) + "</span></div>";
      if (x.summary) h += "<div class='sub'>" + esc(x.summary) + "</div>";
      (x.groups || []).forEach(function (g) {
        if (g.name) h += "<div class='role-block'>" + esc(g.name) + "</div>";
        h += ulist(g.bullets);
      });
      h += "</div>";
    });
    h += "</section>";
  }

  // ---- Skills ----
  if (data.skills && data.skills.length) {
    h += "<section><h2>Technical Skills</h2>";
    data.skills.forEach(function (s) {
      h += "<div class='skills-row'><div class='k'>" + esc(s.category) +
           "</div><div class='v'>" + esc(s.items) + "</div></div>";
    });
    h += "</section>";
  }

  // ---- Honors & Languages ----
  if (data.honors && data.honors.length) {
    h += "<section><h2>Honors &amp; Languages</h2>" + ulist(data.honors) + "</section>";
  }

  document.getElementById("cv").innerHTML = h;
  document.title = (bx.name || "CV") + " — CV";
}

// Load cv-data.js with a cache-busting timestamp so freshly published
// content shows up without a hard refresh. Placed after renderCV so the
// function is guaranteed defined when the script finishes loading.
(function () {
  var s = document.createElement("script");
  s.src = "cv-data.js?v=" + Date.now();
  s.onload = function () { renderCV(); };
  s.onerror = function () {
    document.getElementById("cv").innerHTML =
      "<p style='color:#c0392b'>Failed to load cv-data.js</p>";
  };
  document.head.appendChild(s);
})();
</script>
</body>
</html>
